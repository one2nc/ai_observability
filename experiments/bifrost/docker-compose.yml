services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-obs-bifrost-app
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env}
    ports:
      - "8004:8004"
    environment:
      PORT: "8004"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: []
