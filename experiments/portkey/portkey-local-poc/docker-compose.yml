version: "3.8"
services:
  portkey:
    image: portkeyai/gateway:latest
    container_name: portkey-gateway
    ports:
      - "8787:8787"
    environment:
      - PORTKEY_CLIENT_AUTH=${PORTKEY_CLIENT_AUTH:-local-test-key}
      - LOG_STORE=local
      - LOG_STORE_BASE_PATH=/app/logs
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - portkey-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8787/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

