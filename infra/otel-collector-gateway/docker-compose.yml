services:
  otel-collector-gateway:
    image: otel/opentelemetry-collector-contrib:0.130.0
    container_name: ai-obs-otel-gateway
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./${OTEL_GATEWAY_CONFIG:-config.signoz.yaml}:/etc/otel/config.yaml:ro
    ports:
      - "4417:4317"
      - "4418:4318"
      - "8888:8888"
      - "8889:8889"
    extra_hosts:
      - "host.docker.internal:host-gateway"
