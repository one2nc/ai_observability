receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Self-monitoring
  prometheus:
    config:
      scrape_configs:
        - job_name: otel-gateway
          scrape_interval: 30s
          static_configs:
            - targets: ["localhost:8888"]

processors:
  batch:
    send_batch_size: 500
    timeout: 5s

exporters:
  otlphttp/tempo:
    endpoint: http://host.docker.internal:14318
    tls:
      insecure: true

  otlphttp/loki:
    endpoint: http://host.docker.internal:3100/otlp
    tls:
      insecure: true

  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true

  debug:
    verbosity: basic

service:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
    logs:
      level: info

  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki, debug]
