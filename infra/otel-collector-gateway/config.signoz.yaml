receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Self-monitoring
  prometheus:
    config:
      scrape_configs:
        - job_name: otel-gateway
          scrape_interval: 30s
          static_configs:
            - targets: ["localhost:8888"]

processors:
  batch:
    send_batch_size: 500
    timeout: 5s

exporters:
  # SigNoz exposes its OTel collector on the Docker host.
  otlphttp/signoz:
    endpoint: http://host.docker.internal:4318
    tls:
      insecure: true

  debug:
    verbosity: basic

service:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
    logs:
      level: info

  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/signoz, debug]
    metrics:
      receivers: [otlp, prometheus]
      processors: [batch]
      exporters: [otlphttp/signoz]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/signoz, debug]
